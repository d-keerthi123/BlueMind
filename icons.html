<!DOCTYPE html>
<html>
<head>
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #0f0f1a; color: #e8e8f0; }
    .btn { background: #7c3aed; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    h2 { color: #c4b5fd; margin-bottom: 16px; }
    p  { color: #9ca3af; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>🔵 BlueMind — Icon Generator</h2>
  <p>Click to download icon16.png, icon48.png, icon128.png — place them in the <code>icons/</code> folder.</p>
  <div id="canvases"></div>
  <button class="btn" onclick="downloadAll()">⬇ Download All Icons</button>

  <script>
    const sizes = [16, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");
      const cx = size / 2, cy = size / 2, r = size / 2 - 1;

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0, "#4f46e5"); grad.addColorStop(1, "#2d1b6b");
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = "#7c3aed"; ctx.lineWidth = Math.max(1, size * 0.06); ctx.stroke();

      if (size >= 48) {
        const ew = size * 0.55, eh = size * 0.28;
        ctx.beginPath(); ctx.ellipse(cx, cy - size*0.04, ew/2, eh/2, 0, 0, Math.PI*2);
        ctx.fillStyle = "#1a0a2e"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy - size*0.04, eh*0.45, 0, Math.PI*2);
        ctx.fillStyle = "#60a5fa"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy - size*0.04, eh*0.22, 0, Math.PI*2);
        ctx.fillStyle = "#0a0a1a"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx + eh*0.12, cy - size*0.04 - eh*0.12, eh*0.1, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(cx, cy, size*0.3, 0, Math.PI*2);
        ctx.fillStyle = "#60a5fa"; ctx.fill();
      }
      return canvas;
    }

    sizes.forEach(size => {
      const label = document.createElement("div");
      label.style.cssText = "color:#9ca3af;margin-top:12px";
      label.textContent = `${size}×${size}`;
      document.getElementById("canvases").append(label, drawIcon(size));
    });

    function downloadAll() {
      sizes.forEach((s, i) => setTimeout(() => {
        const a = Object.assign(document.createElement("a"), { download: `icon${s}.png`, href: drawIcon(s).toDataURL() });
        a.click();
      }, i * 300));
    }
  </script>
</body>
</html>
